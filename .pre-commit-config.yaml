# Pre-commit hooks for FBA-Bench project
# Run `pre-commit install` to set up the git hook scripts
# Run `pre-commit run --all-files` to run hooks on all files

repos:
  # Built-in hooks for basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        description: Trim trailing whitespace
      - id: end-of-file-fixer
        description: Ensure files end with a newline
      - id: check-yaml
        description: Check YAML file syntax
      - id: check-toml
        description: Check TOML file syntax
      - id: check-json
        description: Check JSON file syntax
      - id: check-merge-conflict
        description: Check for merge conflict markers
      - id: check-added-large-files
        description: Prevent giant files from being committed
        args: ['--maxkb=1000']
      - id: debug-statements
        description: Check for debugger imports and py37+ breakpoint() calls

  # Black code formatter
  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        description: Format Python code with Black
        language_version: python3.11
        args: [--line-length=88]

  # isort import sorter
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        description: Sort Python imports with isort
        args: [--profile=black, --line-length=88]

  # Ruff linter (replaces flake8, pycodestyle, pyflakes, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.0.287
    hooks:
      - id: ruff
        description: Run Ruff linter
        args: [--fix, --exit-non-zero-on-fix]

  # MyPy static type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1
    hooks:
      - id: mypy
        description: Run MyPy static type checker
        additional_dependencies: [
          types-requests,
          types-PyYAML,
        ]
        args: [--ignore-missing-imports]
        exclude: ^(tests/|docs/)

  # Security checks with bandit
  - repo: https://github.com/pycqa/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        description: Run Bandit security linter
        args: [-r, ., -f, json, -o, bandit-report.json]
        exclude: ^tests/

# Configuration for pre-commit.ci (if using the service)
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false